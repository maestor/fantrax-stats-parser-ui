@if (!(isMobile$ | async)) {
  <app-settings-panel context="player" [maxGames]="maxGames" />
}

<app-stats-table
  [data]="tableData"
  [columns]="tableColumns"
  [defaultSortColumn]="defaultSortColumn"
  [loading]="loading"
  [apiError]="apiError"
  [selectRow]="true"
  [isRowSelected]="isRowSelected"
  [canSelectRow$]="canSelectRow$"
  [onRowSelect]="onRowSelect"
></app-stats-table>
