<div class="team-switcher">
  <mat-form-field subscriptSizing="dynamic">
    <mat-label>{{ "team.selector" | translate }}</mat-label>
    <mat-select [value]="selectedTeamId()" (selectionChange)="changeTeam($event)" [disabled]="loading() || loadError()">
      <mat-select-trigger>
        @if (selectedTeam(); as team) {
        {{ team.presentName }}
        } @else {
        {{ selectedTeamId() }}
        }
      </mat-select-trigger>

      @for (team of teams(); track team.id) {
      <mat-option [value]="team.id">
        {{ team.presentName }}
      </mat-option>
      }
    </mat-select>
  </mat-form-field>
</div>
