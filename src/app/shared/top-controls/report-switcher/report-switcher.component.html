<mat-form-field subscriptSizing="dynamic">
  <mat-label>{{ 'reportType.selector' | translate }}</mat-label>

  <mat-select
    name="reportType"
    [value]="reportType()"
    (selectionChange)="changeReportType($event.value)"
  >
    <mat-select-trigger>
      {{ ('reportType.' + reportType()) | translate }}
    </mat-select-trigger>

    <mat-option value="regular">
      {{ 'reportType.regular' | translate }}
    </mat-option>

    <mat-option value="playoffs">
      {{ 'reportType.playoffs' | translate }}
    </mat-option>

    <mat-option value="both">
      {{ 'reportType.both' | translate }}
    </mat-option>
  </mat-select>
</mat-form-field>
