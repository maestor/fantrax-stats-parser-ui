<a
  class="skip-link"
  [href]="skipLinkTarget"
  (click)="skipToTarget(skipLinkTargetId, $event)"
>
  {{ 'a11y.skipToTable' | translate }}
</a>

<main class="main">
  <div class="content">
    @if (!isDashboardRoute) {
      <div class="title-row">
        <div></div>

        <h1 class="mat-display-1">{{ 'pageTitle' | translate }}</h1>

        <div class="title-row-actions">
          @if (isUpdateAvailable$ | async) {
            <button
              mat-icon-button
              type="button"
              (click)="activateUpdateAndReload()"
              [attr.aria-label]="'a11y.reloadToUpdate' | translate"
              [matTooltip]="'a11y.reloadToUpdate' | translate"
            >
              <mat-icon fontIcon="system_update" />
            </button>
          }

          <button
            mat-icon-button
            type="button"
            (click)="openNavMenu()"
            [attr.aria-label]="'a11y.openNavMenu' | translate"
            [matTooltip]="'a11y.openNavMenu' | translate"
          >
            <mat-icon fontIcon="menu" />
          </button>
        </div>
      </div>

      @if (currentRouteSubtitleKey; as subtitleKey) {
        <h2 class="route-subtitle">
          {{ subtitleKey | translate }}
        </h2>
      }
    }

    <router-outlet />
  </div>
</main>

@if (isFooterVisible()) {
  @defer (on immediate) {
    <app-footer />
  }
}
